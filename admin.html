<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bureau — KykyPay Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%236E93C7%22/><text x=%2250%22 y=%2268%22 font-size=%2252%22 font-family=%22Arial%22 font-weight=%22900%22 text-anchor=%22middle%22 fill=%22%230A0C10%22>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   KykyPay — Bureau d'administration
   Direction : "salle des dossiers" — fiches cartonnées, tampons encreurs,
   onglets de classeur. Un registre, pas un tableau de bord.
   ========================================================================== */
:root{
  --ink:#0A0C10;
  --panel:#12151B;
  --panel-2:#171B23;
  --panel-3:#1D222C;
  --line:rgba(255,255,255,0.08);
  --line-soft:rgba(255,255,255,0.05);
  --paper:#DED8C7;
  --paper-dim:#B9B3A2;
  --text:#EDEEF2;
  --text-muted:#8890A0;
  --text-dim:#535A68;
  --steel:#6E93C7;
  --steel-soft:#A9C2E6;
  --steel-dim:#4B6690;
  --alert:#C1483F;
  --alert-soft:#E08078;
  --ok:#4B9C7E;
  --ok-soft:#7FC4A6;
  --brass:#B8923B;
  --brass-soft:#DDB868;
  --shadow-lg:0 26px 60px -22px rgba(0,0,0,0.7);
  --radius:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1000px 480px at 100% 0%, rgba(110,147,199,0.09), transparent 60%),
    var(--ink);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Archivo',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
::selection{background:var(--steel); color:#0A0C10;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--panel-3); border-radius:8px;}
button{font-family:inherit; cursor:pointer;}
input{font-family:inherit;}
.hidden{display:none !important;}

/* ---------- Loader / gate ---------- */
#gate{
  position:fixed; inset:0; z-index:999; display:flex; align-items:center; justify-content:center;
  background:var(--ink); flex-direction:column; gap:16px; text-align:center; padding:20px;
}
.gate-mark{
  width:52px; height:52px; border-radius:13px; background:linear-gradient(155deg, var(--steel-soft), var(--steel-dim));
  display:flex; align-items:center; justify-content:center; font-family:'Archivo'; font-weight:800; font-size:22px; color:#0A0C10;
  animation:pulse 1.3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.gate-text{color:var(--text-dim); font-size:12.5px; letter-spacing:0.08em; text-transform:uppercase;}
.gate-denied{max-width:360px;}
.gate-denied .stamp{margin:0 auto 18px;}
.gate-denied h2{font-size:19px; margin-bottom:8px;}
.gate-denied p{color:var(--text-muted); font-size:13.5px; line-height:1.6;}

/* ---------- Tampon encreur (élément signature) ---------- */
.stamp{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  border:2.5px solid currentColor; border-radius:8px; padding:4px 11px;
  font-family:'Archivo'; font-weight:800; font-size:11px; letter-spacing:0.09em; text-transform:uppercase;
  transform:rotate(-4deg); opacity:0.92; position:relative; white-space:nowrap;
}
.stamp::before{
  content:''; position:absolute; inset:2px; border:1px solid currentColor; border-radius:5px; opacity:0.5;
}
.stamp.red{color:var(--alert-soft);}
.stamp.brass{color:var(--brass-soft);}
.stamp.ok{color:var(--ok-soft);}
.stamp.steel{color:var(--steel-soft);}

/* ================= TOP RIBBON ================= */
.ribbon{
  display:flex; align-items:center; gap:18px; padding:14px 26px; border-bottom:1px solid var(--line);
  background:rgba(10,12,16,0.9); backdrop-filter:blur(10px); position:sticky; top:0; z-index:80;
}
.ribbon-brand{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.ribbon-brand .mark{width:30px; height:30px; border-radius:8px; background:linear-gradient(155deg, var(--steel-soft), var(--steel-dim)); display:flex; align-items:center; justify-content:center; color:#0A0C10; font-weight:800; font-family:'Archivo'; font-size:14px;}
.ribbon-brand .txt{font-family:'Archivo'; font-weight:800; font-size:15px; letter-spacing:-0.01em;}
.ribbon-brand .txt small{display:block; font-family:'Inter'; font-weight:500; font-size:10.5px; color:var(--text-dim); letter-spacing:0.04em; text-transform:uppercase; margin-top:1px;}

.tape{
  flex:1; overflow:hidden; position:relative; height:26px; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line);
  display:flex; align-items:center;
}
.tape-inner{display:flex; gap:34px; white-space:nowrap; animation:tapeScroll 26s linear infinite; padding-left:100%;}
@keyframes tapeScroll{from{transform:translateX(0);}to{transform:translateX(-100%);}}
.tape-item{font-family:'IBM Plex Mono'; font-size:11.5px; color:var(--text-dim); display:flex; align-items:center; gap:7px;}
.tape-item b{color:var(--steel-soft); font-weight:600;}
.tape-item .pulse{width:5px; height:5px; border-radius:50%; background:var(--ok-soft); box-shadow:0 0 6px var(--ok-soft); animation:blink 1.6s infinite;}
@keyframes blink{50%{opacity:0.25;}}

.ribbon-actions{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.leave-btn{
  border:1px solid var(--line); background:var(--panel); color:var(--text-muted); padding:8px 14px; border-radius:10px;
  font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:7px;
}
.leave-btn:hover{color:var(--text); border-color:var(--steel-dim);}

/* ================= FOLDER TABS ================= */
.folder-nav{display:flex; gap:6px; padding:0 26px; margin-top:16px;}
.folder-tab{
  border:1px solid var(--line); border-bottom:none; background:var(--panel);
  color:var(--text-muted); padding:11px 20px 13px; border-radius:11px 11px 0 0; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:8px; position:relative; top:1px;
}
.folder-tab .cnt{background:var(--panel-3); color:var(--text-dim); font-family:'IBM Plex Mono'; font-size:10px; padding:1px 6px; border-radius:20px;}
.folder-tab.active{background:var(--panel-2); color:var(--text); border-color:var(--line); z-index:2;}
.folder-tab.active .cnt{background:var(--steel-dim); color:var(--steel-soft);}
.folder-tab:not(.active):hover{color:var(--text);}

.desk{ background:var(--panel-2); border:1px solid var(--line); margin:0 26px 30px; border-radius:0 14px 14px 14px; min-height:70vh; }

/* ================= COMPTES : rail + dossier ================= */
.desk-users{display:flex; min-height:70vh;}
.rail{width:330px; flex-shrink:0; border-right:1px solid var(--line); display:flex; flex-direction:column;}
.rail-head{padding:18px; border-bottom:1px solid var(--line-soft);}
.rail-stamps{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
.rail-metric{background:var(--panel); border:1px solid var(--line-soft); border-radius:10px; padding:8px 11px; flex:1; min-width:120px;}
.rail-metric .l{font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-bottom:3px;}
.rail-metric .v{font-family:'IBM Plex Mono'; font-size:15px; font-weight:600;}
.rail-metric .v.warn{color:var(--alert-soft);}
.rail-search{position:relative;}
.rail-search input{
  width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text); padding:10px 12px 10px 32px;
  border-radius:10px; font-size:13px; outline:none;
}
.rail-search input:focus{border-color:var(--steel-dim);}
.rail-search .si{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:12px;}

.rail-list{flex:1; overflow-y:auto; padding:8px;}
.card-idx{
  display:flex; align-items:center; gap:10px; padding:10px; border-radius:11px; cursor:pointer; border:1px solid transparent; margin-bottom:3px;
  transition:background .12s, border-color .12s;
}
.card-idx:hover{background:var(--panel);}
.card-idx.selected{background:var(--panel-3); border-color:var(--steel-dim);}
.card-idx.disabled-acc{opacity:0.45;}
.idx-av{width:34px; height:34px; border-radius:8px; background:var(--panel-3); display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; color:var(--steel-soft); overflow:hidden; flex-shrink:0;}
.idx-av img{width:100%; height:100%; object-fit:cover;}
.idx-mid{flex:1; min-width:0;}
.idx-mid .n1{font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.idx-mid .n2{font-size:10.5px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px;}
.idx-bal{font-family:'IBM Plex Mono'; font-size:12px; font-weight:600; flex-shrink:0; text-align:right;}
.idx-bal.neg{color:var(--alert-soft);}
.idx-flags{display:flex; gap:3px; flex-shrink:0;}
.idx-flag{width:6px; height:6px; border-radius:50%;}
.idx-flag.brass{background:var(--brass-soft);}
.idx-flag.red{background:var(--alert-soft);}
.idx-flag.steel{background:var(--steel-soft);}
.rail-empty{padding:40px 16px; text-align:center; color:var(--text-dim); font-size:12.5px;}

.dossier{flex:1; overflow-y:auto; padding:28px 32px 60px; min-width:0;}
.dossier-empty{height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-dim); text-align:center;}
.dossier-empty .di{font-size:34px; opacity:0.5;}
.dossier-empty .dt{font-size:14px; font-weight:600; color:var(--text-muted); font-family:'Archivo';}
.dossier-empty .ds{font-size:12.5px; max-width:280px; line-height:1.6;}

.d-header{display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:22px; flex-wrap:wrap; position:relative;}
.d-id{display:flex; align-items:center; gap:16px;}
.d-av{width:56px; height:56px; border-radius:10px; background:var(--panel-3); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:var(--steel-soft); overflow:hidden; flex-shrink:0; border:1px solid var(--line);}
.d-av img{width:100%; height:100%; object-fit:cover;}
.d-name{font-family:'Archivo'; font-size:19px; font-weight:700; display:flex; align-items:center; gap:10px;}
.d-sub{font-size:12.5px; color:var(--text-dim); margin-top:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.ip-tag{font-family:'IBM Plex Mono'; font-size:11px; color:var(--text-dim);}
.ip-tag.dup{color:var(--alert-soft); font-weight:600;}
.d-suspend-stamp{position:absolute; right:0; top:-6px;}

.d-grid{display:grid; grid-template-columns:250px 1fr; gap:22px; align-items:start;}
@media (max-width:900px){ .d-grid{grid-template-columns:1fr;} }

.ledger-balance{
  border-radius:12px; padding:18px; background:var(--panel); border:1px solid var(--line); margin-bottom:14px;
  background-image:repeating-linear-gradient(180deg, transparent, transparent 27px, var(--line-soft) 28px);
}
.ledger-balance .l{font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-bottom:6px;}
.ledger-balance .v{font-family:'IBM Plex Mono'; font-size:25px; font-weight:700;}
.ledger-balance .v.neg{color:var(--alert-soft);}

.action-col{display:flex; flex-direction:column; gap:8px;}
.d-action{
  width:100%; text-align:left; padding:11px 13px; border-radius:10px; border:1px solid var(--line); background:var(--panel);
  color:var(--text); font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:10px;
}
.d-action:hover{border-color:var(--steel-dim); background:var(--panel-3);}
.d-action .aic{font-size:14px; width:18px; text-align:center; flex-shrink:0;}
.d-action.danger{color:var(--alert-soft);}
.d-action.danger:hover{border-color:var(--alert); background:rgba(193,72,63,0.08);}
.d-action.brass{border-color:var(--brass); background:rgba(184,146,59,0.08); color:var(--brass-soft);}

.related-box{margin-top:14px; padding:12px 13px; border-radius:10px; background:rgba(193,72,63,0.06); border:1px solid rgba(193,72,63,0.3);}
.related-box .t{font-size:10.5px; font-weight:700; color:var(--alert-soft); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.04em;}
.related-box .ru{display:flex; align-items:center; gap:8px; padding:5px 0; font-size:12px; color:var(--text-muted); cursor:pointer;}
.related-box .ru:hover{color:var(--text);}

.section{margin-bottom:22px;}
.section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid var(--line-soft); padding-bottom:8px;}
.section-head h3{font-size:11.5px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; font-family:'Inter';}

.ledger-row{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line-soft); font-size:12.5px;}
.ledger-row:last-child{border-bottom:none;}
.ledger-row .arrow{width:20px; height:20px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10.5px; flex-shrink:0;}
.ledger-row .arrow.in{background:rgba(75,156,126,0.15); color:var(--ok-soft);}
.ledger-row .arrow.out{background:rgba(193,72,63,0.13); color:var(--alert-soft);}
.ledger-row .mid{flex:1; min-width:0;}
.ledger-row .mid .m1{font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.ledger-row .mid .m2{color:var(--text-dim); font-size:11px; margin-top:1px;}
.ledger-row .amt{font-family:'IBM Plex Mono'; font-weight:700; flex-shrink:0;}
.ledger-empty{padding:16px 4px; color:var(--text-dim); font-size:12px;}

.log-row{display:flex; gap:10px; padding:7px 4px; font-size:12px; border-bottom:1px solid var(--line-soft);}
.log-row:last-child{border-bottom:none;}
.log-row .lt{color:var(--text-dim); font-family:'IBM Plex Mono'; font-size:10.5px; white-space:nowrap; flex-shrink:0;}
.log-row .lm{color:var(--text-muted);}

.chart-wrap svg{width:100%; height:auto; display:block; overflow:visible;}
.chart-trend-row{display:flex; align-items:center; justify-content:flex-end; margin-bottom:8px;}
.trend-tag{font-family:'IBM Plex Mono'; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;}
.trend-tag.up{color:var(--ok-soft); background:rgba(75,156,126,0.12);}
.trend-tag.down{color:var(--alert-soft); background:rgba(193,72,63,0.12);}
.trend-tag.flat{color:var(--text-muted); background:var(--panel-3);}
.chart-pt{transition:r .1s;}
.chart-pt:hover{r:5;}

/* ================= DETTES / CONSOLE panes ================= */
.pane-full{padding:28px 32px 60px; max-width:980px; margin:0 auto; width:100%;}
.ledger-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:20px;}
.ledger-card h2{font-size:14px; font-weight:700; margin-bottom:16px; font-family:'Archivo';}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media (max-width:600px){ .form-grid{grid-template-columns:1fr;} }
.f-field{margin-bottom:14px;}
.f-field label{display:block; font-size:11.5px; color:var(--text-muted); margin-bottom:6px; font-weight:500;}
.f-input{
  width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text); padding:11px 13px;
  border-radius:9px; font-size:13.5px; outline:none;
}
.f-input:focus{border-color:var(--steel-dim);}
.btn-file{
  border:none; border-radius:10px; padding:11px 18px; font-weight:700; font-size:13px;
  background:linear-gradient(150deg, var(--steel-soft), var(--steel-dim)); color:#0A0C10; position:relative;
}
.btn-file:hover{filter:brightness(1.05);}
.btn-file:disabled{opacity:0.55;}
.btn-file .spin{display:none;}
.btn-file.loading .txt{visibility:hidden;}
.btn-file.loading .spin{display:block; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);}
.btn-ghost{border:1px solid var(--line); background:var(--panel-2); color:var(--text-muted); border-radius:9px; padding:9px 14px; font-size:12.5px; font-weight:600;}
.btn-ghost:hover{color:var(--text); border-color:var(--steel-dim);}
.btn-danger{border:none; background:rgba(193,72,63,0.15); color:var(--alert-soft); border-radius:9px; padding:8px 12px; font-size:12px; font-weight:700;}

.debt-line{display:flex; align-items:center; gap:12px; padding:12px 10px; border-radius:10px; border:1px solid var(--line-soft); margin-bottom:8px; background:var(--panel-2);}
.debt-line .dm{flex:1; min-width:0;}
.debt-line .dm .t1{font-size:13px; font-weight:600;}
.debt-line .dm .t2{font-size:11px; color:var(--text-dim); margin-top:3px;}
.debt-amt{font-family:'IBM Plex Mono'; font-weight:700; font-size:13.5px; white-space:nowrap; color:var(--alert-soft);}

.console-slab{
  background:#050608; border:1px solid var(--line); border-radius:12px; padding:16px; height:64vh; overflow-y:auto;
  font-family:'IBM Plex Mono'; font-size:12px; line-height:1.75; color:var(--steel-soft);
}
.console-line{white-space:pre-wrap; word-break:break-word;}
.console-line .ts{color:var(--text-dim);}
.console-line .amt-in{color:var(--ok-soft); font-weight:600;}

/* ================= toasts (repris, palette bureau) ================= */
#toastWrap{position:fixed; top:20px; right:20px; z-index:500; display:flex; flex-direction:column; gap:10px; max-width:340px;}
.toast{
  background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start;
  box-shadow:var(--shadow-lg); animation:slidein .25s ease;
}
@keyframes slidein{from{transform:translateX(40px); opacity:0;}to{transform:translateX(0); opacity:1;}}
.toast .t-ic{width:32px; height:32px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px;}
.toast.success .t-ic{background:rgba(75,156,126,0.15); color:var(--ok-soft);}
.toast.error .t-ic{background:rgba(193,72,63,0.15); color:var(--alert-soft);}
.toast .t-title{font-size:13px; font-weight:700;}
.toast .t-sub{font-size:12px; color:var(--text-muted); margin-top:2px;}

/* ---------- modals ---------- */
.modal-backdrop{position:fixed; inset:0; background:rgba(4,5,7,0.72); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:200; padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{width:100%; max-width:420px; background:var(--panel-2); border:1px solid var(--line); border-radius:16px; padding:24px; box-shadow:var(--shadow-lg); animation:pop .18s ease;}
@keyframes pop{from{transform:scale(0.96); opacity:0;}to{transform:scale(1); opacity:1;}}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.modal-head h3{font-size:16px; font-weight:700; font-family:'Archivo';}
.modal-close{background:var(--panel-3); border:none; color:var(--text-muted); width:26px; height:26px; border-radius:50%; font-size:14px;}
.modal-close:hover{color:var(--text);}
.amount-wrap{position:relative;}
.amount-wrap input{font-family:'IBM Plex Mono'; font-size:20px; font-weight:700; padding-left:32px;}
.amount-wrap .cur{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--steel-soft); font-family:'IBM Plex Mono'; font-weight:700; font-size:18px;}
.mode-toggle{display:flex; gap:4px; background:var(--panel); border:1px solid var(--line); padding:4px; border-radius:10px; margin-bottom:14px;}
.mode-toggle button{flex:1; padding:8px 0; border:none; background:transparent; color:var(--text-muted); border-radius:7px; font-weight:700; font-size:12.5px;}
.mode-toggle button.active.credit{background:rgba(75,156,126,0.16); color:var(--ok-soft);}
.mode-toggle button.active.debit{background:rgba(193,72,63,0.16); color:var(--alert-soft);}
.err-line{background:rgba(193,72,63,0.1); border:1px solid rgba(193,72,63,0.3); color:var(--alert-soft); font-size:12.5px; padding:9px 11px; border-radius:9px; margin-bottom:14px; display:none;}
.err-line.show{display:block;}
.spinner{width:16px; height:16px; border-radius:50%; border:2.5px solid rgba(10,12,16,0.25); border-top-color:#0A0C10; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-mark">A</div>
  <div class="gate-text" id="gateText">Vérification des accès…</div>
</div>

<div id="toastWrap"></div>

<div id="app" class="hidden">
  <div class="ribbon">
    <div class="ribbon-brand">

function formatMoney(n){
  const num = Number(n) || 0;
  return new Intl.NumberFormat('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}).format(num) + " K";
}
function initials(prenom, nom){
  return ((prenom && prenom[0] ? prenom[0] : "") + (nom && nom[0] ? nom[0] : "")).toUpperCase() || "?";
}
function fmtDate(ts){
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
  if (sameDay) return "Aujourd'hui, " + time;
  return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}) + ", " + time;
}
function escapeHtml(str){
  return String(str||"").replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
  });
}

  const wrap = $('toastWrap');

  wrap.appendChild(el);
  setTimeout(function(){

  }, 4200);
}
function setLoading(btnId, loading){

function withTimeout(promise, ms){

    promise,
    new Promise(function(_, reject){ setTimeout(function(){ reject(new Error('Délai dépassé — la base de données ne répond pas.')); }, ms); })
  ]);
}

  if (!user){

    return;

  currentUser = user;
  let profile = null;
  try{
    const snap = await db.ref(ROOT+"/users/"+user.uid).once('value');

  }catch(e){}

  if (!profile || profile.disabled){
    if (profile && profile.disabled) await auth.signOut();
    window.location.href = 'index.html';
    return;
  }

    denyAccess();
    return;

  $('app').classList.remove('hidden');
  initAdmin();
});

    ];

/* ---------------- Chargement des comptes ---------------- */
async function loadUsers(){
  let users = [];
  try{
    const snap = await db.ref(ROOT+"/users").once('value');
    snap.forEach(function(c){ users.push(Object.assign({uid:c.key}, c.val())); });
  }catch(err){
    $('userList').innerHTML = '<div class="rail-empty">Erreur de chargement : '+escapeHtml(err && err.message || String(err))+'</div>';
    return;
  }
  usersCache = users;
  ipCounts = {};
  users.forEach(function(u){ if (u.ip && u.ip!=='inconnue'){ ipCounts[u.ip] = (ipCounts[u.ip]||0)+1; } });

  const totalMass = users.reduce(function(s,u){ return s+(u.solde||0); }, 0);
  const negCount = users.filter(function(u){ return (u.solde||0)<0; }).length;
  const dupCount = users.filter(function(u){ return u.ip && ipCounts[u.ip]>1; }).length;

  $('mUsers').textContent = users.length;
  $('mMass').textContent = formatMoney(totalMass);
  $('mNeg').textContent = negCount;
  $('mDup').textContent = dupCount;

  renderUserList();
  startTape();

  if (selectedUid && users.some(function(u){ return u.uid===selectedUid; })){
    renderDossier(selectedUid);
  }
}

function renderChartInto(points, wrapEl, trendEl){
  if (!points || points.length === 0){
    wrapEl.innerHTML = '<div class="ledger-empty">Pas encore de données pour ce compte.</div>';
    if (trendEl){ trendEl.textContent = '—'; trendEl.className = 'trend-tag flat'; }
    return;
  }
  points = points.slice().sort(function(a,b){ return a.date-b.date; });
  if (points.length === 1){ points = [{balance:points[0].balance, date: points[0].date-1}, points[0]]; }
  const W=400,H=140,padX=8,padY=14;
  const values = points.map(function(p){ return p.balance; });
  let min=Math.min.apply(null,values), max=Math.max.apply(null,values);
  if (min===max){ min-=1; max+=1; }
  const stepX = (W-padX*2)/(points.length-1);
  function scaleY(v){ return H-padY-((v-min)/(max-min))*(H-padY*2); }
  const coords = points.map(function(p,i){ return [padX+i*stepX, scaleY(p.balance)]; });
  const linePath = coords.map(function(c,i){ return (i===0?'M':'L')+c[0].toFixed(1)+' '+c[1].toFixed(1); }).join(' ');
  const areaPath = linePath+' L '+coords[coords.length-1][0].toFixed(1)+' '+(H-padY)+' L '+coords[0][0].toFixed(1)+' '+(H-padY)+' Z';
  const first=values[0], last=values[values.length-1];
  const diff = last-first;
  const pct = first!==0 ? (diff/first*100) : 0;
  if (trendEl){
    trendEl.className = 'trend-tag ' + (diff>0.001?'up':diff<-0.001?'down':'flat');
    trendEl.textContent = (diff>0.001?'▲ +':diff<-0.001?'▼ ':'— ') + formatMoney(Math.abs(diff)) + (first?(' ('+(pct>=0?'+':'')+pct.toFixed(1)+'%)'):'');
  }
  const circles = coords.map(function(c,i){
    const p = points[i];
    const dateStr = new Date(p.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
    return '<circle class="chart-pt" cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="3" fill="var(--steel-soft)"><title>'+dateStr+' — '+formatMoney(p.balance)+'</title></circle>';
  }).join('');
  wrapEl.innerHTML = '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#6E93C7" stop-opacity="0.32"/>'+
    '<stop offset="100%" stop-color="#6E93C7" stop-opacity="0"/>'+
    '</linearGradient></defs>'+
    '<path d="'+areaPath+'" fill="url(#cg)" stroke="none"/>'+
    '<path d="'+linePath+'" fill="none" stroke="var(--steel-soft)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    circles+'</svg>';
}

async function loadChartSection(uid){
  try{
    const snap = await withTimeout(db.ref(ROOT+"/balanceHistory/"+uid).orderByChild('date').once('value'), 10000);
    if (!sectionStillValid('secChart', uid)) return;
    const points = [];
    snap.forEach(function(c){ points.push(c.val()); });
    renderChartInto(points, $('secChart'), $('secTrend'));
  }catch(err){
    if (!sectionStillValid('secChart', uid)) return;
    $('secChart').innerHTML = '<div class="ledger-empty">⚠️ '+escapeHtml(err && err.message || String(err))+'</div>';
  }
}

async function loadTxSection(uid){
  try{
    const results = await withTimeout(Promise.all([
      db.ref(ROOT+"/transactions").orderByChild('toUid').equalTo(uid).once('value'),
      db.ref(ROOT+"/transactions").orderByChild('fromUid').equalTo(uid).once('value')
    ]), 10000);
    if (!sectionStillValid('secTx', uid)) return;
    const map = new Map();
    results[0].forEach(function(c){ map.set(c.key, c.val()); });
    results[1].forEach(function(c){ map.set(c.key, c.val()); });
    const txList = Array.from(map.values()).sort(function(a,b){ return b.date-a.date; }).slice(0,8);
    $('secTx').innerHTML = txList.length===0 ? '<div class="ledger-empty">Aucune transaction.</div>' : txList.map(function(tx){
      const received = tx.toUid === uid;
      const other = received ? tx.fromNom : tx.toNom;
      return '<div class="ledger-row">'+
        '<div class="arrow '+(received?'in':'out')+'">'+(received?'↙':'↗')+'</div>'+
        '<div class="mid"><div class="m1">'+(received?'Reçu de ':'Envoyé à ')+escapeHtml(other)+'</div><div class="m2">'+(tx.message?escapeHtml(tx.message)+' · ':'')+fmtDate(tx.date)+'</div></div>'+
        '<div class="amt" style="color:'+(received?'var(--ok-soft)':'var(--alert-soft)')+'">'+(received?'+':'−')+' '+formatMoney(tx.amount).trim()+'</div>'+
      '</div>';
    }).join('');
  }catch(err){
    if (!sectionStillValid('secTx', uid)) return;
    $('secTx').innerHTML = '<div class="ledger-empty">⚠️ '+escapeHtml(err && err.message || String(err))+'</div>';
  }
}

async function loadDebtsSection(uid){
  try{
    const results = await withTimeout(Promise.all([
      db.ref(ROOT+"/debts").orderByChild('debtorUid').equalTo(uid).once('value'),
      db.ref(ROOT+"/debts").orderByChild('creditorUid').equalTo(uid).once('value')
    ]), 10000);
    if (!sectionStillValid('secDebts', uid)) return;
    const map = new Map();
    results[0].forEach(function(c){ map.set(c.key, Object.assign({id:c.key}, c.val())); });
    results[1].forEach(function(c){ map.set(c.key, Object.assign({id:c.key}, c.val())); });
    const debtList = Array.from(map.values()).sort(function(a,b){ return b.date-a.date; });
    $('secDebts').innerHTML = debtList.length===0 ? '<div class="ledger-empty">Aucune dette liée.</div>' : debtList.map(function(d){
      const isDebtor = d.debtorUid === uid;
      const label = isDebtor ? ('Doit à '+escapeHtml(d.creditorNom)) : (escapeHtml(d.debtorNom)+' lui doit');
      return '<div class="ledger-row">'+
        '<div class="mid"><div class="m1">'+label+'</div><div class="m2">'+(d.note?escapeHtml(d.note)+' · ':'')+fmtDate(d.date)+'</div></div>'+
        (d.settled ? '<span class="stamp ok" style="font-size:9.5px; padding:2px 8px;">Réglée</span>' : '<div class="amt" style="color:var(--alert-soft);">'+formatMoney(d.amount)+'</div>')+
        (d.settled?'':'<button class="btn-ghost" data-settle="'+d.id+'" style="margin-left:8px;">Régler</button>')+
      '</div>';
    }).join('');
    $('secDebts').querySelectorAll('[data-settle]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        await db.ref(ROOT+"/debts/"+btn.dataset.settle+"/settled").set(true);
        showToast('success', 'Dette marquée comme réglée');
        loadDebtsSection(uid);
      });
    });
  }catch(err){
    if (!sectionStillValid('secDebts', uid)) return;
    $('secDebts').innerHTML = '<div class="ledger-empty">⚠️ '+escapeHtml(err && err.message || String(err))+'</div>';
  }
}

async function loadLogSection(uid){
  try{
    const snap = await withTimeout(db.ref(ROOT+"/adminLogs/"+uid).orderByChild('date').limitToLast(10).once('value'), 10000);
    if (!sectionStillValid('secLog', uid)) return;
    const logs = [];
    snap.forEach(function(c){ logs.push(c.val()); });
    logs.sort(function(a,b){ return b.date-a.date; });
    $('secLog').innerHTML = logs.length===0 ? '<div class="ledger-empty">Aucune action admin enregistrée pour ce compte.</div>' : logs.map(function(l){
      return '<div class="log-row"><div class="lt">'+fmtDate(l.date)+'</div><div class="lm">'+escapeHtml(l.message)+' <span style="color:var(--text-dim);">— par '+escapeHtml(l.byEmail||'admin')+'</span></div></div>';
    }).join('');
  }catch(err){
    if (!sectionStillValid('secLog', uid)) return;
    $('secLog').innerHTML = '<div class="ledger-empty">Journal indisponible pour l\'instant.</div>';
  }
}

async function logAction(uid, message){
  try{
    await db.ref(ROOT+"/adminLogs/"+uid).push({ message: message, byEmail: currentProfile.email, date: Date.now() });
  }catch(err){ console.error('[Bureau KykyPay] Journal indisponible :', err); }
}

async function handleAction(action, u){
  try{
    if (action === 'grant'){
      const result = await db.ref(ROOT+"/users/"+u.uid+"/solde").transaction(function(c){ return Math.round(((c||0)+STARTING_BALANCE)*100)/100; });
      await db.ref(ROOT+"/users/"+u.uid+"/pendingStartBonus").set(false);
      await db.ref(ROOT+"/balanceHistory/"+u.uid).push({balance: result.snapshot.val(), date: Date.now()});
      await logAction(u.uid, 'Bonus de bienvenue de 1 000 K accordé');
      showToast('success', 'Bonus accordé', '1 000 K ont été crédités.');
      loadUsers();
    } else if (action === 'adjust'){
      openAdjustModal(u);
    } else if (action === 'newdebt'){
      switchTab('debts'); loadDebts();
      $('debtFrom').value = u.email;
      $('debtTo').value = '';
      $('debtTo').focus();
    } else if (action === 'suspend' || action === 'unsuspend'){
      const disabled = action === 'suspend';
      await db.ref(ROOT+"/users/"+u.uid+"/disabled").set(disabled);
      await logAction(u.uid, disabled ? 'Compte suspendu' : 'Compte réactivé');
      showToast('success', disabled ? 'Compte suspendu' : 'Compte réactivé', disabled ? 'Cette personne ne pourra plus se connecter.' : 'Cette personne peut de nouveau se connecter.');
      loadUsers();
    }
  }catch(err){
    showToast('error', "L'action a échoué", String(err && (err.custom||err.message) || err));
    console.error(err);
  }
}

/* ---------------- Ajustement de solde ---------------- */
let adjustTarget = null;
let adjustMode = 'credit';
function openAdjustModal(u){
  adjustTarget = u; adjustMode = 'credit';
  $('adjustCredit').classList.add('active'); $('adjustDebit').classList.remove('active');
  $('adjustLabel').textContent = 'Pour : '+u.prenom+' '+u.nom+' ('+u.email+') — solde actuel '+formatMoney(u.solde||0);
  $('adjustErr').classList.remove('show');
  $('adjustAmt').value = ''; $('adjustNote').value = '';
  $('adjustBackdrop').classList.add('open');
}
$('adjustClose').addEventListener('click', function(){ $('adjustBackdrop').classList.remove('open'); });
$('adjustBackdrop').addEventListener('click', function(e){ if(e.target.id==='adjustBackdrop') $('adjustBackdrop').classList.remove('open'); });
$('adjustCredit').addEventListener('click', function(){ adjustMode='credit'; $('adjustCredit').classList.add('active'); $('adjustDebit').classList.remove('active'); });
$('adjustDebit').addEventListener('click', function(){ adjustMode='debit'; $('adjustDebit').classList.add('active'); $('adjustCredit').classList.remove('active'); });

$('adjustForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errEl = $('adjustErr'); errEl.classList.remove('show');
  const amount = parseFloat($('adjustAmt').value);
  const note = $('adjustNote').value.trim();
  if (!(amount>0)){ errEl.textContent = "Le montant doit être supérieur à 0."; errEl.classList.add('show'); return; }
  setLoading('adjustBtn', true);
  try{
    const delta = adjustMode==='credit' ? amount : -amount;
    const uid = adjustTarget.uid;
    const result = await db.ref(ROOT+"/users/"+uid+"/solde").transaction(function(c){
      const next = Math.round(((c||0)+delta)*100)/100;
      if (next < DEBT_LIMIT) return;
      return next;
    });
    if (!result.committed) throw {custom:"Cet ajustement dépasserait la limite de découvert autorisée (-1 000 K)."};
    await db.ref(ROOT+"/balanceHistory/"+uid).push({balance: result.snapshot.val(), date: Date.now()});
    await logAction(uid, (adjustMode==='credit'?'Crédit de ':'Débit de ')+formatMoney(amount)+(note?(' — '+note):''));
    showToast('success', 'Solde ajusté', (adjustMode==='credit'?'+':'−')+' '+formatMoney(amount).trim()+' pour '+adjustTarget.prenom+'.');
    $('adjustBackdrop').classList.remove('open');
    loadUsers();
  }catch(err){
    errEl.textContent = (err && err.custom) || String(err && err.message || err);
    errEl.classList.add('show');
  }finally{
    setLoading('adjustBtn', false);
  }
});

/* ---------------- Dettes (vue registre) ---------------- */
$('debtForm').addEventListener('submit', async function(e){
  e.preventDefault();
  setLoading('debtBtn', true);
  try{
    const debtorEmail = $('debtFrom').value.trim();
    const creditorEmail = $('debtTo').value.trim();
    const amount = parseFloat($('debtAmt').value);
    const note = $('debtNote').value.trim();
    if (debtorEmail === creditorEmail) throw {custom:"Le débiteur et le créancier doivent être différents."};

    const dSnap = await db.ref(ROOT+"/users").orderByChild('email').equalTo(debtorEmail).once('value');
    const cSnap = await db.ref(ROOT+"/users").orderByChild('email').equalTo(creditorEmail).once('value');
    if (!dSnap.exists() || !cSnap.exists()) throw {custom:"Un des deux utilisateurs est introuvable."};
    const debtorUid = Object.keys(dSnap.val())[0], debtorData = Object.values(dSnap.val())[0];
    const creditorUid = Object.keys(cSnap.val())[0], creditorData = Object.values(cSnap.val())[0];

    const debtId = db.ref(ROOT+"/debts").push().key;
    await db.ref(ROOT+"/debts/"+debtId).set({
      debtorUid: debtorUid, debtorNom: debtorData.prenom+" "+debtorData.nom, debtorEmail: debtorEmail,
      creditorUid: creditorUid, creditorNom: creditorData.prenom+" "+creditorData.nom, creditorEmail: creditorEmail,
      amount: amount, note: note || null, settled: false, date: Date.now()
    });
    $('debtForm').reset();
    showToast('success', 'Dette inscrite au registre');
    loadDebts();
  }catch(err){
    showToast('error', 'Erreur', (err && err.custom) || 'Impossible de créer la dette.');
  }finally{
    setLoading('debtBtn', false);
  }
});

async function loadDebts(){
  const snap = await db.ref(ROOT+"/debts").once('value');
  const debts = [];
  snap.forEach(function(c){ debts.push(Object.assign({id:c.key}, c.val())); });
  debts.sort(function(a,b){ return b.date-a.date; });
  $('cntDebts').textContent = debts.filter(function(d){ return !d.settled; }).length;
  if (debts.length === 0){
    $('debtsList').innerHTML = '<p style="font-size:12.5px; color:var(--text-dim);">Aucune dette enregistrée.</p>';
    return;
  }
  $('debtsList').innerHTML = debts.map(function(d){
    return '<div class="debt-line">'+
      '<div class="dm"><div class="t1">'+escapeHtml(d.debtorNom)+' doit à '+escapeHtml(d.creditorNom)+'</div><div class="t2">'+(d.note?escapeHtml(d.note)+' · ':'')+fmtDate(d.date)+'</div></div>'+
      (d.settled ? '<span class="stamp ok" style="font-size:9.5px; padding:2px 8px;">Réglée</span>' : '<div class="debt-amt">'+formatMoney(d.amount)+'</div>')+
      (d.settled?'':'<button class="btn-ghost" data-id="'+d.id+'" data-act="settle">Marquer réglée</button>')+
      '<button class="btn-danger" data-id="'+d.id+'" data-act="delete">✕</button>'+
    '</div>';
  }).join('');
  $('debtsList').querySelectorAll('[data-act="settle"]').forEach(function(btn){
    btn.addEventListener('click', async function(){ await db.ref(ROOT+"/debts/"+btn.dataset.id+"/settled").set(true); loadDebts(); });
  });
  $('debtsList').querySelectorAll('[data-act="delete"]').forEach(function(btn){
    btn.addEventListener('click', async function(){ await db.ref(ROOT+"/debts/"+btn.dataset.id).remove(); loadDebts(); });
  });
}

/* ---------------- Console en direct ---------------- */
function attachConsole(){
  if (consoleAttached) return;
  consoleAttached = true;
  const box = $('consoleSlab');
  db.ref(ROOT+"/transactions").orderByChild('date').limitToLast(50).on('child_added', function(snap){
    const tx = snap.val();
    const time = new Date(tx.date).toLocaleTimeString('fr-FR');
    const line = document.createElement('div');
    line.className = 'console-line';
    line.innerHTML = '<span class="ts">['+time+']</span> '+escapeHtml(tx.fromEmail)+' → '+escapeHtml(tx.toEmail)+' : <span class="amt-in">'+tx.amount.toFixed(2)+' K</span>'+(tx.message?(' "'+escapeHtml(tx.message)+'"'):'');
    box.appendChild(line);
    while (box.children.length > 200) box.removeChild(box.firstChild);
    box.scrollTop = box.scrollHeight;
  });
}
</script>
